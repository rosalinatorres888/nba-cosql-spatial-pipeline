name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Syntax check
        run: python -m py_compile model/nl2sql.py model/evaluate.py kappa_report.py load_csvs_to_db.py collect_nba_data.py
      - name: Run tests
        run: pytest tests/ -v
