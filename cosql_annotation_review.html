<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoSQL Annotation Review — NBA Spatial Pipeline</title>
<style>
  :root {
    --bg: #0a0a0a; --surface: #111; --border: #27272a;
    --text: #e4e4e7; --muted: #71717a; --faint: #3f3f46;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; min-height: 100vh; }

  /* Layout */
  .layout { display: flex; height: 100vh; overflow: hidden; }
  .sidebar { width: 200px; min-width: 200px; border-right: 1px solid var(--border); overflow-y: auto; padding: 12px 8px; display: flex; flex-direction: column; gap: 2px; }
  .main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }

  /* Header */
  .header { border-bottom: 1px solid var(--border); padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; position: sticky; top: 0; background: var(--bg); z-index: 10; }
  .header-left h1 { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; }
  .header-left p { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .header-right { display: flex; align-items: center; gap: 16px; font-size: 12px; }
  .stat { display: flex; align-items: center; gap: 5px; }
  .stat-num { font-family: monospace; font-weight: 600; }

  /* Toolbar */
  .toolbar { padding: 10px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .toolbar input { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 6px 10px; border-radius: 8px; font-size: 12px; width: 220px; outline: none; }
  .toolbar input:focus { border-color: #555; }
  .toolbar select { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 6px 10px; border-radius: 8px; font-size: 12px; outline: none; cursor: pointer; }
  .btn { display: inline-flex; align-items: center; gap: 5px; padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: 500; cursor: pointer; border: 1px solid var(--border); background: var(--surface); color: var(--text); transition: all .15s; }
  .btn:hover { background: #1f1f1f; border-color: #555; }
  .btn-export { background: #00c8e022; border-color: #00c8e055; color: #00c8e0; }
  .btn-export:hover { background: #00c8e033; }
  .pair-count { font-size: 11px; color: var(--muted); margin-left: auto; }

  /* Sidebar nav */
  .sidebar-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; padding: 4px 8px 2px; margin-top: 6px; }
  .nav-btn { display: flex; align-items: center; justify-content: space-between; padding: 6px 8px; border-radius: 8px; font-size: 11px; cursor: pointer; border: none; background: transparent; color: var(--muted); width: 100%; text-align: left; transition: all .15s; border-left: 2px solid transparent; }
  .nav-btn:hover { color: var(--text); background: #ffffff08; }
  .nav-btn.active { background: color-mix(in srgb, var(--cls-color) 15%, transparent); color: var(--cls-color); border-left-color: var(--cls-color); }
  .nav-count { font-family: monospace; font-size: 10px; }

  /* Cards */
  .cards { padding: 12px 16px; display: flex; flex-direction: column; gap: 8px; }
  .card { border: 1px solid var(--border); border-radius: 12px; overflow: hidden; transition: border-color .15s; }
  .card.expanded { border-color: color-mix(in srgb, var(--cls-color) 35%, transparent); background: color-mix(in srgb, var(--cls-color) 4%, transparent); }
  .card-header { display: flex; align-items: flex-start; gap: 10px; padding: 12px; cursor: pointer; }
  .card-header:hover .utterance { color: #fff; }
  .expand-icon { color: var(--muted); font-size: 11px; margin-top: 2px; flex-shrink: 0; transition: transform .15s; user-select: none; }
  .expanded .expand-icon { transform: rotate(90deg); }
  .card-body-text { flex: 1; min-width: 0; }
  .turn-context { font-size: 11px; color: var(--muted); font-style: italic; margin-bottom: 4px; }
  .utterance { font-size: 13px; color: var(--text); font-weight: 500; line-height: 1.4; }
  .card-meta { display: flex; align-items: center; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
  .class-badge { font-size: 10px; padding: 2px 7px; border-radius: 5px; font-weight: 500; }
  .status-badge { font-size: 10px; padding: 2px 7px; border-radius: 20px; border: 1px solid; display: flex; align-items: center; gap: 3px; }
  .status-approved { background: #16a34a22; color: #4ade80; border-color: #16a34a44; }
  .status-revision { background: #ca8a0422; color: #fbbf24; border-color: #ca8a0444; }
  .status-unknown  { background: #71717a22; color: #a1a1aa; border-color: #71717a44; }
  .exec-pass   { background: #16a34a22; color: #4ade80; border-color: #16a34a44; font-size: 10px; padding: 2px 7px; border-radius: 20px; border: 1px solid; }
  .exec-fail   { background: #dc262622; color: #f87171; border-color: #dc262644; font-size: 10px; padding: 2px 7px; border-radius: 20px; border: 1px solid; }

  /* Card body */
  .card-content { border-top: 1px solid var(--border); padding: 12px 14px; display: none; }
  .card.expanded .card-content { display: block; }
  .section-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 5px; }
  pre.sql { font-family: "SF Mono", "Fira Code", monospace; font-size: 11px; color: #c9d1d9; background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 10px 12px; overflow-x: auto; white-space: pre-wrap; word-break: break-word; line-height: 1.5; }
  .notes-text { font-size: 11px; color: var(--muted); font-style: italic; border-left: 2px solid var(--faint); padding-left: 8px; margin-top: 8px; line-height: 1.5; }

  /* Reviewer section */
  .reviewer-section { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .reviewer-section label { font-size: 11px; color: var(--muted); display: block; margin-bottom: 4px; }
  .reviewer-section select, .reviewer-section input, .reviewer-section textarea {
    width: 100%; background: var(--surface); border: 1px solid var(--border); color: var(--text);
    padding: 6px 8px; border-radius: 8px; font-size: 11px; outline: none; font-family: inherit;
  }
  .reviewer-section select:focus, .reviewer-section textarea:focus { border-color: #555; }
  .reviewer-section textarea { resize: vertical; min-height: 56px; grid-column: 1 / -1; }
  .reviewer-section .name-field { grid-column: 1 / -1; }
  .save-btn { margin-top: 8px; width: 100%; padding: 7px; background: #00c8e022; border: 1px solid #00c8e055; color: #00c8e0; border-radius: 8px; font-size: 12px; font-weight: 500; cursor: pointer; transition: all .15s; }
  .save-btn:hover { background: #00c8e033; }
  .saved-indicator { font-size: 10px; color: #4ade80; margin-top: 4px; display: none; text-align: center; }

  /* Empty state */
  .empty { text-align: center; color: var(--muted); padding: 60px 20px; font-size: 13px; }

  /* Progress bar */
  .progress-bar { height: 3px; background: var(--border); }
  .progress-fill { height: 100%; background: #00c8e0; transition: width .3s; }
</style>
</head>
<body>

<div class="layout">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-label">Query Class</div>
    <button class="nav-btn active" data-class="All" style="--cls-color:#888">
      <span>All Classes</span><span class="nav-count" id="cnt-All"></span>
    </button>
    <button class="nav-btn" data-class="Spatial Zone" style="--cls-color:#00c8e0">
      <span>Spatial Zone</span><span class="nav-count" id="cnt-Spatial_Zone"></span>
    </button>
    <button class="nav-btn" data-class="Temporal Scope" style="--cls-color:#2ecc40">
      <span>Temporal Scope</span><span class="nav-count" id="cnt-Temporal_Scope"></span>
    </button>
    <button class="nav-btn" data-class="Player/Entity" style="--cls-color:#9b30d9">
      <span>Player/Entity</span><span class="nav-count" id="cnt-Player-Entity"></span>
    </button>
    <button class="nav-btn" data-class="Simple Aggregation" style="--cls-color:#e67e22">
      <span>Simple Aggregation</span><span class="nav-count" id="cnt-Simple_Aggregation"></span>
    </button>
    <button class="nav-btn" data-class="Comparative Aggregation" style="--cls-color:#e74c3c">
      <span>Comparative Aggregation</span><span class="nav-count" id="cnt-Comparative_Aggregation"></span>
    </button>
    <button class="nav-btn" data-class="Multi-Turn Coreference" style="--cls-color:#f39c12">
      <span>Multi-Turn Coreference</span><span class="nav-count" id="cnt-Multi-Turn_Coreference"></span>
    </button>
    <button class="nav-btn" data-class="Game/Matchup Context" style="--cls-color:#3498db">
      <span>Game/Matchup Context</span><span class="nav-count" id="cnt-Game-Matchup_Context"></span>
    </button>
    <button class="nav-btn" data-class="Shot Characteristics" style="--cls-color:#1abc9c">
      <span>Shot Characteristics</span><span class="nav-count" id="cnt-Shot_Characteristics"></span>
    </button>

    <div class="sidebar-label" style="margin-top:12px">Review State</div>
    <button class="nav-btn active-state" data-state="all" style="--cls-color:#888">All states</button>
    <button class="nav-btn" data-state="approved" style="--cls-color:#4ade80">Approved</button>
    <button class="nav-btn" data-state="needs_revision" style="--cls-color:#fbbf24">Needs revision</button>
    <button class="nav-btn" data-state="unreviewed" style="--cls-color:#a1a1aa">My unreviewed</button>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="header">
      <div class="header-left">
        <h1>CoSQL Annotation Review</h1>
        <p>NBA Spatial Pipeline · IE7500 NLP · nba_spatial</p>
      </div>
      <div class="header-right">
        <div class="stat"><span class="stat-num" style="color:#4ade80" id="stat-approved">0</span><span style="color:var(--muted)">approved</span></div>
        <div class="stat"><span class="stat-num" style="color:#fbbf24" id="stat-flagged">0</span><span style="color:var(--muted)">flagged</span></div>
        <div class="stat"><span class="stat-num" style="color:#00c8e0" id="stat-reviewed">0</span><span style="color:var(--muted)">my reviews</span></div>
        <div class="stat"><span class="stat-num" id="stat-total">0</span><span style="color:var(--muted)">total</span></div>
        <button class="btn btn-export" onclick="exportCSV()">⬇ Export my reviews</button>
      </div>
    </div>

    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>

    <div class="toolbar">
      <input type="text" id="search" placeholder="Search utterances or SQL…" oninput="render()">
      <select id="exec-filter" onchange="render()">
        <option value="all">All execution states</option>
        <option value="pass">Exec pass ✓</option>
        <option value="fail">Exec fail ✗</option>
      </select>
      <button class="btn" onclick="expandAll()">Expand all</button>
      <button class="btn" onclick="collapseAll()">Collapse all</button>
      <span class="pair-count" id="pair-count"></span>
    </div>

    <div class="cards" id="cards"></div>
  </div>
</div>

<script>
const PAIRS = [{"id": "Spatial_Zone_0", "utterance": "How many shots came from the left corner?", "gold_sql": "SELECT COUNT(*) FROM shot_charts WHERE x <= -220 AND y <= 90", "class_label": "Spatial Zone", "state": "approved", "execution_pass": "TRUE", "notes": "Left corner 3 zone: x <= -220 AND y <= 90 (tenths of feet). Verified: 382 rows live.", "turn_index": "", "prior_utterance": ""}, {"id": "Spatial_Zone_1", "utterance": "Only made shots from the left corner.", "gold_sql": "SELECT COUNT(*) FROM shot_charts WHERE x <= -220 AND y <= 90 AND made_flag = 1", "class_label": "Spatial Zone", "state": "approved", "execution_pass": "TRUE", "notes": "Same zone + made_flag filter. Coreference: 'Only made' adds constraint to prior zone from Turn 1.", "turn_index": "", "prior_utterance": ""}, {"id": "Spatial_Zone_2", "utterance": "How many shots from the right corner?", "gold_sql": "SELECT COUNT(*) FROM shot_charts WHERE x >= 220 AND y <= 90", "class_label": "Spatial Zone", "state": "approved", "execution_pass": "TRUE", "notes": "Right corner 3 zone: x >= 220 AND y <= 90. Verified: 394 rows live. Mirror of left corner.", "turn_index": "", "prior_utterance": ""}, {"id": "Spatial_Zone_3", "utterance": "What about missed ones only?", "gold_sql": "SELECT COUNT(*) FROM shot_charts WHERE x >= 220 AND y <= 90 AND made_flag = 0", "class_label": "Spatial Zone", "state": "approved", "execution_pass": "TRUE", "notes": "Turn 2 coreference: carries forward right corner zone from Turn 1; adds made_flag = 0 (missed).", "turn_index": "", "prior_utterance": ""}, {"id": "Spatial_Zone_4", "utterance": "How many 3-pointers were taken above the break?", "gold_sql": "SELECT COUNT(*) FROM shot_charts WHERE y > 90 AND distance > 22", "class_label": "Spatial Zone", "state": "approved", "execution_pass": "TRUE", "notes": "Above-the-break 3: y > 90 AND distance > 22 (feet not tenths). Verified: 2706 rows live. Critical: distance in whole feet.", "turn_index": "", "prior_utterance": ""}, {"id": "Spatial_Zone_5", "utterance": "How many of those were made?", "gold_sql": "SELECT COUNT(*) FROM shot_charts WHERE y > 90 AND distance > 22 AND made_flag = 1", "class_label": "Spatial Zone", "state": "approved", "execution_pass": "TRUE", "notes": "Turn 2: adds made_flag = 1 to above-break-3 zone from Turn 1.", "turn_index": "", "prior_utterance": ""}, {"id": "Spatial_Zone_6", "utterance": "How many shot attempts came from inside the restricted area?", "gold_sql": "SELECT COUNT(*) FROM shot_charts WHERE distance <= 4 OR (ABS(x) <= 80 AND y <= 190)", "class_label": "Spatial Zone", "state": "approved", "execution_pass": "TRUE", "notes": "Restricted area: distance <= 4 OR paint. Compound filter. Verified zone boundaries. Note: includes both distance-based and coordinate-based filter.", "turn_index": "", "prior_utterance": ""}, {"id": "Spatial_Zone_7", "utterance": "Which players had the most attempts there?", "gold_sql": "SELECT p.name, COUNT(*) as attempts FROM shot_charts sc JOIN players p ON sc.player_id = p.player_id WHERE distance <= 4 OR (ABS(x) <= 80 AND y <= 190) GROUP BY p.name ORDER BY attempts DESC", "class_label": "Spatial Zone", "state": "approved", "execution_pass": "TRUE", "notes": "Turn 2: restricted area zone carried forward; aggregated by player name via JOIN. Fixed annotation: return p.name not player_id — conversational query expects readable names.", "turn_index": "", "prior_utterance": ""}, {"id": "Spatial_Zone_8", "utterance": "Show me all mid-range shot attempts.", "gold_sql": "SELECT COUNT(*) FROM shot_charts WHERE distance BETWEEN 8 AND 22", "class_label": "Spatial Zone", "state": "approved", "execution_pass": "TRUE", "notes": "Mid-range zone: distance BETWEEN 8 AND 22 (whole feet). Verified: 1383 rows live.", "turn_index": "", "prior_utterance": ""}, {"id": "Spatial_Zone_9", "utterance": "What percentage of those were made?", "gold_sql": "SELECT CAST(SUM(CASE WHEN made_flag = 1 THEN 1 ELSE 0 END) AS FLOAT) / COUNT(*) as fg_pct FROM shot_charts WHERE distance BETWEEN 8 AND 22", "class_label": "Spatial Zone", "state": "approved", "execution_pass": "TRUE", "notes": "Turn 2: adds percentage calculation to mid-range from Turn 1. FLOAT cast prevents integer division.", "turn_index": "", "prior_utterance": ""}, {"id": "Spatial_Zone_10", "utterance": "How many shots were taken in the paint?", "gold_sql": "SELECT COUNT(*) FROM shot_charts WHERE ABS(x) <= 80 AND y <= 190", "class_label": "Spatial Zone", "state": "approved", "execution_pass": "TRUE", "notes": "In-the-paint full lane: ABS(x) <= 80 AND y <= 190. Verified: 3344 rows live. Broader than restricted area.", "turn_index": "", "prior_utterance": ""}, {"id": "Spatial_Zone_11", "utterance": "What was the shooting percentage in the paint compared to above the break?", "gold_sql": "SELECT CAST(SUM(CASE WHEN ABS(x) <= 80 AND y <= 190 AND made_flag = 1 THEN 1 ELSE 0 END) AS FLOAT) / NULLIF(SUM(CASE WHEN ABS(x) <= 80 AND y <= 190 THEN 1 ELSE 0 END), 0) as paint_pct, CAST(SUM(CASE WHEN y > 90 AND distance > 22 AND made_flag = 1 THEN 1 ELSE 0 END) AS FLOAT) / NULLIF(SUM(CASE WHEN y > 90 AND distance > 22 THEN 1 ELSE 0 END), 0) as above_break_pct FROM shot_charts", "class_label": "Spatial Zone", "state": "approved", "execution_pass": "TRUE", "notes": "Two-zone FG% comparison as single-row two-column output. Fixed annotation: inline CAST/NULLIF per zone matches natural model output shape. Verified both values live.", "turn_index": "", "prior_utterance": ""}, {"id": "Spatial_Zone_12", "utterance": "How many corner 3s — left and right combined?", "gold_sql": "SELECT COUNT(*) FROM shot_charts WHERE (x <= -220 AND y <= 90) OR (x >= 220 AND y <= 90)", "class_label": "Spatial Zone", "state": "approved", "execution_pass": "TRUE", "notes": "Combined corner 3 zones via OR. Natural phrasing 'combined' triggers OR not AND. Verified: 382 + 394 = 776 total.", "turn_index": "", "prior_utterance": ""}, {"id": "Spatial_Zone_13", "utterance": "Break it down by left and right.", "gold_sql": "SELECT CASE WHEN x <= -220 THEN 'left_corner' ELSE 'right_corner' END as corner_side, COUNT(*) as attempts FROM shot_charts WHERE (x <= -220 AND y <= 90) OR (x >= 220 AND y <= 90) GROUP BY corner_side", "class_label": "Spatial Zone", "state": "approved", "execution_pass": "TRUE", "notes": "Turn 2: carries forward combined corner zone; adds CASE WHEN breakdown by side. GROUP BY pattern.", "turn_index": "", "prior_utterance": ""}, {"id": "Spatial_Zone_14", "utterance": "Were there any shots taken beyond 30 feet?", "gold_sql": "SELECT COUNT(*) FROM shot_charts WHERE distance > 30", "class_label": "Spatial Zone", "state": "approved", "execution_pass": "TRUE", "notes": "Deep 3 / half-court attempt filter. Distance in whole feet. No zone name in schema — raw distance filter used.", "turn_index": "", "prior_utterance": ""}, {"id": "Spatial_Zone_15", "utterance": "What about between 25 and 30 feet?", "gold_sql": "SELECT COUNT(*) FROM shot_charts WHERE distance BETWEEN 25 AND 30", "class_label": "Spatial Zone", "state": "approved", "execution_pass": "TRUE", "notes": "Turn 2: narrows distance range from Turn 1 (>30). BETWEEN used for bounded range query.", "turn_index": "", "prior_utterance": ""}, {"id": "Spatial_Zone_16", "utterance": "How many shots were attempted outside the paint but inside the 3-point line?", "gold_sql": "SELECT COUNT(*) FROM shot_charts WHERE distance BETWEEN 8 AND 22 AND NOT (ABS(x) <= 80 AND y <= 190)", "class_label": "Spatial Zone", "state": "approved", "execution_pass": "TRUE", "notes": "Classic mid-range exclusion: BETWEEN 8 AND 22 feet but NOT in the paint. Two-zone compound filter. Phrasing 'inside the 3-point line' maps to distance < 22.", "turn_index": "", "prior_utterance": ""}, {"id": "Spatial_Zone_17", "utterance": "How many of Jayson Tatum's shots in Q4 came from the paint?", "gold_sql": "SELECT COUNT(*) FROM shot_charts WHERE player_id = (SELECT player_id FROM players WHERE name ILIKE '%Jayson Tatum%') AND period = 4 AND ABS(x) <= 80 AND y ": "TRUE", "notes": "JOIN games for date context; GROUP BY game; ORDER BY FG% DESC; LIMIT 1. No opponent filter needed.", "turn_index": "", "prior_utterance": ""}, {"id": "Shot_Characteristics_0", "utterance": "How many shots were taken from beyond 28 feet?", "gold_sql": "SELECT COUNT(*) FROM shot_charts WHERE distance > 28", "class_label": "Shot Characteristics", "state": "approved", "execution_pass": "TRUE", "notes": "Deep 3 / half-court range. distance in whole feet. Verified: 140 shots.", "turn_index": "", "prior_utterance": ""}, {"id": "Shot_Characteristics_1", "utterance": "How many of those went in?", "gold_sql": "SELECT COUNT(*) FROM shot_charts WHERE distance > 28 AND made_flag = 1", "class_label": "Shot Characteristics", "state": "approved", "execution_pass": "TRUE", "notes": "Turn 2: carries distance > 28 forward; adds made_flag = 1.", "turn_index": "", "prior_utterance": ""}, {"id": "Shot_Characteristics_2", "utterance": "How many shots were taken within 4 feet of the basket?", "gold_sql": "SELECT COUNT(*) FROM shot_charts WHERE distance <= 4", "class_label": "Shot Characteristics", "state": "approved", "execution_pass": "TRUE", "notes": "Restricted area / layup range. distance <= 4 feet. Verified: 2221 shots.", "turn_index": "", "prior_utterance": ""}, {"id": "Shot_Characteristics_3", "utterance": "What was the shooting percentage from that range?", "gold_sql": "SELECT CAST(SUM(CASE WHEN made_flag = 1 THEN 1 ELSE 0 END) AS FLOAT) / COUNT(*) as fg_pct FROM shot_charts WHERE distance <= 4", "class_label": "Shot Characteristics", "state": "approved", "execution_pass": "TRUE", "notes": "Turn 2: carries distance <= 4; adds FG% metric. Highest expected percentage in dataset.", "turn_index": "", "prior_utterance": ""}, {"id": "Shot_Characteristics_4", "utterance": "How many shots came from between 15 and 20 feet?", "gold_sql": "SELECT COUNT(*) FROM shot_charts WHERE distance BETWEEN 15 AND 20", "class_label": "Shot Characteristics", "state": "approved", "execution_pass": "TRUE", "notes": "Classic mid-range elbow range. BETWEEN 15 AND 20 feet. Verified: 440 shots.", "turn_index": "", "prior_utterance": ""}, {"id": "Shot_Characteristics_5", "utterance": "How many were made from that distance?", "gold_sql": "SELECT COUNT(*) FROM shot_charts WHERE distance BETWEEN 15 AND 20 AND made_flag = 1", "class_label": "Shot Characteristics", "state": "approved", "execution_pass": "TRUE", "notes": "Turn 2: same distance range; adds made_flag = 1.", "turn_index": "", "prior_utterance": ""}, {"id": "Shot_Characteristics_6", "utterance": "Were there any shots from half court or beyond?", "gold_sql": "SELECT COUNT(*) FROM shot_charts WHERE distance >= 47", "class_label": "Shot Characteristics", "state": "approved", "execution_pass": "TRUE", "notes": "NBA half court = ~47 feet. distance >= 47. Tests extreme distance range; verified max distance = 76ft in dataset.", "turn_index": "", "prior_utterance": ""}, {"id": "Shot_Characteristics_7", "utterance": "What is the average shot distance in the dataset?", "gold_sql": "SELECT ROUND(AVG(distance), 1) as avg_distance FROM shot_charts", "class_label": "Shot Characteristics", "state": "approved", "execution_pass": "TRUE", "notes": "AVG(distance) with ROUND to 1 decimal. Useful baseline characteristic of the shot profile.", "turn_index": "", "prior_utterance": ""}, {"id": "Shot_Characteristics_8", "utterance": "What is the average distance on made shots versus missed shots?", "gold_sql": "SELECT CASE WHEN made_flag = 1 THEN 'made' ELSE 'missed' END as result, ROUND(AVG(distance), 1) as avg_distance FROM shot_charts GROUP BY made_flag ORDER BY made_flag DESC", "class_label": "Shot Characteristics", "state": "approved", "execution_pass": "TRUE", "notes": "CASE WHEN labels + AVG(distance) per outcome. Tests whether makes cluster closer to basket than misses.", "turn_index": "", "prior_utterance": ""}, {"id": "Shot_Characteristics_9", "utterance": "How many shots were taken at exactly 0 feet — dunks and tip-ins?", "gold_sql": "SELECT COUNT(*) FROM shot_charts WHERE distance = 0", "class_label": "Shot Characteristics", "state": "approved", "execution_pass": "TRUE", "notes": "distance = 0 captures dunks, layup tip-ins at the rim. Verified: 489 shots.", "turn_index": "", "prior_utterance": ""}, {"id": "Shot_Characteristics_10", "utterance": "What percentage of 0-foot attempts were made?", "gold_sql": "SELECT CAST(SUM(CASE WHEN made_flag = 1 THEN 1 ELSE 0 END) AS FLOAT) / COUNT(*) as fg_pct FROM shot_charts WHERE distance = 0", "class_label": "Shot Characteristics", "state": "approved", "execution_pass": "TRUE", "notes": "Turn 2: distance = 0 carried; FG% metric. Expected very high — dunks rarely missed.", "turn_index": "", "prior_utterance": ""}, {"id": "Shot_Characteristics_11", "utterance": "How many shots came from the left side of the court?", "gold_sql": "SELECT COUNT(*) FROM shot_charts WHERE x < 0", "class_label": "Shot Characteristics", "state": "approved", "execution_pass": "TRUE", "notes": "x < 0 = left side of court (x is negative for left, positive for right in nba_api coordinate system). No distance filter.", "turn_index": "", "prior_utterance": ""}, {"id": "Shot_Characteristics_12", "utterance": "How many came from the right side?", "gold_sql": "SELECT COUNT(*) FROM shot_charts WHERE x > 0", "class_label": "Shot Characteristics", "state": "approved", "execution_pass": "TRUE", "notes": "Turn 2: mirrors pair 12. x > 0 = right side. Together reveals court side shot distribution.", "turn_index": "", "prior_utterance": ""}, {"id": "Shot_Characteristics_13", "utterance": "How many contested shots were there?", "gold_sql": "SELECT COUNT(*) FROM shot_charts WHERE defender IS NOT NULL", "class_label": "Shot Characteristics", "state": "needs_revision", "execution_pass": "FALSE", "notes": "Bug: defender column is NULL for all 7396 rows — ShotChartDetail API does not provide defender information. Returns 0. SQL structurally correct. Annotation note: any NL query about 'contested' shots must be flagged clarification_needed — data is unavailable in this endpoint.", "turn_index": "", "prior_utterance": ""}, {"id": "Shot_Characteristics_14", "utterance": "How many shots were taken with less than 5 seconds left in the period?", "gold_sql": "SELECT COUNT(*) FROM shot_charts WHERE (minutes_remaining * 60 + period_seconds_remaining) < 5", "class_label": "Shot Characteristics", "state": "approved", "execution_pass": "TRUE", "notes": "Bug 11 resolved: minutes_remaining backfilled. Verified: 215 shots. Fixed annotation: strict < 5 (not <= 5) — 'less than 5 seconds' excludes exactly-5-second mark.", "turn_index": "", "prior_utterance": ""}];

const CLASS_COLORS = {"Spatial Zone": "#00c8e0", "Temporal Scope": "#2ecc40", "Player/Entity": "#9b30d9", "Simple Aggregation": "#e67e22", "Comparative Aggregation": "#e74c3c", "Multi-Turn Coreference": "#f39c12", "Game/Matchup Context": "#3498db", "Shot Characteristics": "#1abc9c"};

// Reviews stored in localStorage
const STORAGE_KEY = 'cosql_reviews_v1';
let reviews = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');

function saveReview(id, data) {
  reviews[id] = { ...reviews[id], ...data, updated: new Date().toISOString() };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(reviews));
  updateStats();
}

function getReview(id) { return reviews[id] || {}; }

// State
let activeClass = 'All';
let activeState = 'all';

// Sidebar nav
document.querySelectorAll('[data-class]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-class]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeClass = btn.dataset.class;
    render();
  });
});
document.querySelectorAll('[data-state]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-state]').forEach(b => b.classList.remove('active-state'));
    btn.classList.add('active-state');
    activeState = btn.dataset.state;
    render();
  });
});

function filteredPairs() {
  const q = document.getElementById('search').value.toLowerCase();
  const exec = document.getElementById('exec-filter').value;
  return PAIRS.filter(p => {
    if (activeClass !== 'All' && p.class_label !== activeClass) return false;
    if (activeState === 'approved' && p.state !== 'approved') return false;
    if (activeState === 'needs_revision' && p.state !== 'needs_revision') return false;
    if (activeState === 'unreviewed' && getReview(p.id).verdict) return false;
    if (exec === 'pass' && p.execution_pass !== 'TRUE' && p.execution_pass !== 'True') return false;
    if (exec === 'fail' && (p.execution_pass === 'TRUE' || p.execution_pass === 'True')) return false;
    if (q && !p.utterance.toLowerCase().includes(q) && !p.gold_sql.toLowerCase().includes(q)) return false;
    return true;
  });
}

function statusBadge(state) {
  if (state === 'approved') return '<span class="status-badge status-approved">✓ approved</span>';
  if (state === 'needs_revision') return '<span class="status-badge status-revision">⚠ needs revision</span>';
  return '<span class="status-badge status-unknown">— unknown</span>';
}

function execBadge(ep) {
  const pass = ep === 'TRUE' || ep === 'True';
  return pass
    ? '<span class="exec-pass">exec ✓</span>'
    : '<span class="exec-fail">exec ✗</span>';
}

function render() {
  const fp = filteredPairs();
  document.getElementById('pair-count').textContent = fp.length + ' pairs';

  // Update sidebar counts
  document.getElementById('cnt-All').textContent = PAIRS.length;
  Object.keys(CLASS_COLORS).forEach(cls => {
    const el = document.getElementById('cnt-' + cls.replace('/', '-').replace(/ /g, '_'));
    if (el) el.textContent = PAIRS.filter(p => p.class_label === cls).length;
  });

  const container = document.getElementById('cards');
  container.innerHTML = fp.length === 0
    ? '<div class="empty">No pairs match the current filter.</div>'
    : fp.map(p => cardHTML(p)).join('');

  // Attach expand toggles
  container.querySelectorAll('.card-header').forEach(h => {
    h.addEventListener('click', () => {
      h.closest('.card').classList.toggle('expanded');
    });
  });

  // Attach save buttons
  container.querySelectorAll('.save-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      const id = btn.dataset.id;
      const card = btn.closest('.card');
      const verdict = card.querySelector('.verdict-select').value;
      const reviewer = card.querySelector('.reviewer-name').value.trim();
      const comment = card.querySelector('.reviewer-comment').value.trim();
      saveReview(id, { verdict, reviewer, comment });
      const ind = card.querySelector('.saved-indicator');
      ind.style.display = 'block';
      setTimeout(() => { ind.style.display = 'none'; }, 1800);
    });
  });
}

function cardHTML(p) {
  const color = CLASS_COLORS[p.class_label] || '#888';
  const r = getReview(p.id);
  const turnCtx = p.turn_index === '2' || p.turn_index === '3'
    ? `<div class="turn-context">↳ Turn ${p.turn_index} · prior: "${(p.prior_utterance||'').slice(0,55)}…"</div>` : '';
  const myVerdictBadge = r.verdict
    ? `<span class="status-badge" style="background:${r.verdict==='approved'?'#16a34a22':'#ca8a0422'};color:${r.verdict==='approved'?'#4ade80':'#fbbf24'};border-color:${r.verdict==='approved'?'#16a34a44':'#ca8a0444'}">👤 ${r.reviewer||'me'}: ${r.verdict.replace('_',' ')}</span>` : '';

  return `<div class="card" data-id="${p.id}" style="--cls-color:${color}">
  <div class="card-header">
    <span class="expand-icon">▶</span>
    <div class="card-body-text">
      ${turnCtx}
      <div class="utterance">"${escHtml(p.utterance)}"</div>
      <div class="card-meta">
        <span class="class-badge" style="background:${color}22;color:${color}">${p.class_label}</span>
        ${statusBadge(p.state)}
        ${execBadge(p.execution_pass)}
        ${myVerdictBadge}
      </div>
    </div>
  </div>
  <div class="card-content">
    <div class="section-label">Gold SQL</div>
    <pre class="sql">${escHtml(p.gold_sql)}</pre>
    ${p.notes ? `<div class="notes-text">${escHtml(p.notes)}</div>` : ''}
    <div class="reviewer-section">
      <div class="name-field">
        <label>Your name</label>
        <input class="reviewer-name" type="text" placeholder="e.g. Sean" value="${escHtml(r.reviewer||'')}">
      </div>
      <div>
        <label>Your verdict</label>
        <select class="verdict-select">
          <option value="">— select —</option>
          <option value="approved" ${r.verdict==='approved'?'selected':''}>✓ Approved — SQL is correct</option>
          <option value="needs_revision" ${r.verdict==='needs_revision'?'selected':''}>⚠ Needs revision</option>
          <option value="unclear" ${r.verdict==='unclear'?'selected':''}>? Unclear / discuss</option>
        </select>
      </div>
      <div>
        <label>Execution result</label>
        <select class="exec-select">
          <option value="">— did you run it? —</option>
          <option value="ran_correct" ${r.exec==='ran_correct'?'selected':''}>Ran · result looks correct</option>
          <option value="ran_wrong" ${r.exec==='ran_wrong'?'selected':''}>Ran · result looks wrong</option>
          <option value="cannot_run">Cannot run (no DB access)</option>
        </select>
      </div>
      <textarea class="reviewer-comment" placeholder="Notes / comments (optional)…">${escHtml(r.comment||'')}</textarea>
      <button class="save-btn" data-id="${p.id}">Save review</button>
      <div class="saved-indicator">✓ Saved</div>
    </div>
  </div>
</div>`;
}

function escHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function updateStats() {
  const approved = PAIRS.filter(p => p.state === 'approved').length;
  const flagged = PAIRS.filter(p => p.state === 'needs_revision').length;
  const myReviewed = Object.values(reviews).filter(r => r.verdict).length;
  document.getElementById('stat-approved').textContent = approved;
  document.getElementById('stat-flagged').textContent = flagged;
  document.getElementById('stat-reviewed').textContent = myReviewed;
  document.getElementById('stat-total').textContent = PAIRS.length;
  document.getElementById('progress-fill').style.width = (myReviewed / PAIRS.length * 100) + '%';
}

function expandAll() {
  document.querySelectorAll('.card').forEach(c => c.classList.add('expanded'));
}
function collapseAll() {
  document.querySelectorAll('.card').forEach(c => c.classList.remove('expanded'));
}

function exportCSV() {
  const rows = [['id','utterance','gold_sql','class_label','original_state','reviewer','verdict','exec_result','comment','updated']];
  PAIRS.forEach(p => {
    const r = getReview(p.id);
    if (!r.verdict) return;
    rows.push([p.id, p.utterance, p.gold_sql, p.class_label, p.state,
               r.reviewer||'', r.verdict||'', r.exec||'', r.comment||'', r.updated||'']);
  });
  if (rows.length === 1) { alert('No reviews saved yet. Review some pairs first.'); return; }
  const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'cosql_reviews_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
}

// Init
updateStats();
render();
</script>
</body>
